<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">ATTDS pipeline overview</title>
  <desc id="desc">A five stage workflow from DICOM CT input through L3 localisation, segmentation, metrics, and review outputs.</desc>
  <rect width="1180" height="360" fill="#ffffff"/>
  <text x="590" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Automated L3 Sarcopenia Analysis Pipeline</text>
  <text x="590" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">Portfolio diagram generated from the project workflow. No patient data is included.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(48 128)">
      <rect width="170" height="122" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
      <circle cx="45" cy="42" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="74" y="26" width="58" height="32" rx="4" fill="#eff6ff" stroke="#2563eb"/>
      <text x="85" y="82" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">DICOM CT</text>
      <text x="85" y="106" text-anchor="middle" font-size="13" fill="#475569">Series discovery + NIfTI</text>
    </g>
    <line x1="230" y1="189" x2="280" y2="189" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(292 128)">
      <rect width="170" height="122" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
      <path d="M85 26 C110 38 111 71 88 95 C63 76 58 42 85 26 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="85" y="82" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">L3 localisation</text>
      <text x="85" y="106" text-anchor="middle" font-size="13" fill="#475569">Largest L3 vertebra mask</text>
    </g>
    <line x1="474" y1="189" x2="524" y2="189" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(536 128)">
      <rect width="170" height="122" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="62" cy="51" rx="29" ry="19" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
      <ellipse cx="108" cy="51" rx="29" ry="19" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
      <text x="85" y="82" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Segmentation</text>
      <text x="85" y="106" text-anchor="middle" font-size="13" fill="#475569">Manual, TS, or 2D U-Net</text>
    </g>
    <line x1="718" y1="189" x2="768" y2="189" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(780 128)">
      <rect width="170" height="122" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
      <text x="85" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">CSA</text>
      <text x="85" y="76" text-anchor="middle" font-size="18" font-weight="700" fill="#16a34a">SMRA</text>
      <text x="85" y="104" text-anchor="middle" font-size="13" fill="#475569">Optional SMI if height exists</text>
    </g>
    <line x1="962" y1="189" x2="1012" y2="189" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(1024 128)">
      <rect width="110" height="122" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
      <polyline points="20,78 42,55 62,67 90,35" fill="none" stroke="#ea580c" stroke-width="4"/>
      <circle cx="42" cy="55" r="4" fill="#ea580c"/>
      <circle cx="62" cy="67" r="4" fill="#ea580c"/>
      <text x="55" y="98" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Review</text>
    </g>
  </g>
</svg>
